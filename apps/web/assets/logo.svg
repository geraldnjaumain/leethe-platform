<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Minimalist Dark Obsidian Container -->
  <rect width="100" height="100" rx="28" fill="#000000" />
  <rect x="1" y="1" width="98" height="98" rx="27" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2" />
  
  <!-- Minimalist Iconic Dragon Mark -->
  <g transform="translate(50, 50) scale(0.85)">
    <!-- Dragon Wing & Body Geometry -->
    <path d="M 0 -36 
             C 18 -36, 32 -22, 32 0 
             C 32 18, 22 28, 12 34 
             L 0 42 
             L -12 34 
             C -22 28, -32 18, -32 0 
             C -32 -22, -18 -36, 0 -36 Z" 
          fill="#FFFFFF" />
    
    <!-- Negative Space Eye & Horn Cutout -->
    <path d="M 0 -26 
             L 14 -10 
             L 0 6 
             L -14 -10 Z" 
          fill="#000000" />
    
    <!-- Central Git Commit Node -->
    <circle cx="0" cy="18" r="6" fill="#000000" />
    <circle cx="0" cy="18" r="3" fill="#FFFFFF" />
    
    <!-- Swept Dragon Horn Accents -->
    <path d="M -14 -22 L -28 -38 L -18 -12 Z" fill="#FFFFFF" />
    <path d="M 14 -22 L 28 -38 L 18 -12 Z" fill="#FFFFFF" />
  </g>
</svg>
