# Leethe Platform Caddyfile Configuration

{
    admin off
    auto_https off
}

# Main Application & API Gateway Route
http://localhost, http://leethe.app {
    # WebSocket Log Streaming Route
    handle /logs* {
        reverse_proxy compute-service:8083 {
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up Connection "Upgrade"
            header_up Upgrade "websocket"
        }
    }

    # Smart HTTP Git Protocol Routes
    handle /git/* {
        reverse_proxy vcs-service:8082 {
            header_up Host {host}
            header_up X-Real-IP {remote_host}
        }
    }

    # Identity & Auth Routes
    handle /api/auth/* {
        reverse_proxy identity-service:8081 {
            header_up Host {host}
            header_up X-Real-IP {remote_host}
        }
    }

    # Web Dashboard Static & Dynamic App Frontend
    handle {
        reverse_proxy compute-service:8083 {
            header_up Host {host}
            header_up X-Real-IP {remote_host}
        }
    }
}

# Wildcard Preview & Deployment Subdomains (*.leethe.dev)
http://*.leethe.dev {
    reverse_proxy compute-service:8083 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-Host {host}
    }
}
